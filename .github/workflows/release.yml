name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Import internal macOS signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE:-}" ] || [ -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]; then
            echo "MACOS_CERTIFICATE and MACOS_CERTIFICATE_PASSWORD secrets are required for internal macOS release signing." >&2
            exit 1
          fi
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-local-voice-assistant-ci-keychain}"
          SIGNING_IDENTITY="${MACOS_SIGNING_IDENTITY:-Local Voice Assistant Self Signed}"
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain || true
          echo "internal signing smoke test" > signing-smoke.txt
          codesign --force --sign "$SIGNING_IDENTITY" signing-smoke.txt
          codesign --verify --verbose=2 signing-smoke.txt
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "鱼泡语音助手 ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "鱼泡语音助手多平台安装包"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  rename-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename release assets to clean ASCII names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          PREFIX="local-voice-assistant"
          # 草稿 release 需要从全部 release 列表里按 tag 匹配
          REL=$(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\")")
          echo "$REL" | jq -r '.assets[] | "\(.id) \(.name)"' | while read -r ID NAME; do
            case "$NAME" in
              _*) NEW="${PREFIX}${NAME}" ;;
              *)  NEW="$NAME" ;;
            esac
            if [ "$NEW" != "$NAME" ]; then
              gh api -X PATCH "repos/$REPO/releases/assets/$ID" -f name="$NEW" >/dev/null
              echo "renamed: $NAME -> $NEW"
            fi
          done
